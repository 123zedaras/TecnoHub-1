<section class="auth-shell">
  <div class="auth-card">
    <h1>Accede a tu cuenta</h1>

    <div class="tab-actions" role="tablist" aria-label="Elegir formulario">
      <button
        type="button"
        class="tab-btn"
        [class.active]="activeTab === 'login'"
        (click)="setTab('login')"
      >
        Iniciar sesión
      </button>
      <button
        type="button"
        class="tab-btn"
        [class.active]="activeTab === 'register'"
        (click)="setTab('register')"
      >
        Regístrate
      </button>
    </div>

    <!-- ── Formulario de login ── -->
    <form *ngIf="activeTab === 'login'" class="auth-form" (ngSubmit)="onLoginSubmit()">

      <div class="alert-error" *ngIf="loginError">{{ loginError }}</div>

      <label for="login-email">Email</label>
      <input
        id="login-email"
        name="email"
        type="email"
        autocomplete="email"
        [(ngModel)]="loginForm.email"
        required
      />
      <small class="error" *ngIf="loginSubmitted && !loginForm.email.trim()">
        El email es obligatorio.
      </small>

      <label for="login-password">Contraseña</label>
      <input
        id="login-password"
        name="password"
        type="password"
        autocomplete="current-password"
        [(ngModel)]="loginForm.password"
        required
      />
      <small class="error" *ngIf="loginSubmitted && !loginForm.password">
        La contraseña es obligatoria.
      </small>

      <button type="submit" class="submit-btn" [disabled]="loading">
        {{ loading ? 'Iniciando sesión…' : 'Iniciar sesión' }}
      </button>
    </form>

    <!-- ── Formulario de registro ── -->
    <form *ngIf="activeTab === 'register'" class="auth-form" (ngSubmit)="onRegisterSubmit()">

      <div class="alert-error" *ngIf="registerError">{{ registerError }}</div>

      <label for="register-email">Email</label>
      <input
        id="register-email"
        name="email"
        type="email"
        autocomplete="email"
        [(ngModel)]="registerForm.email"
        required
      />
      <small class="error" *ngIf="registerSubmitted && !registerForm.email.trim()">
        El email es obligatorio.
      </small>

      <label for="register-name">Nombre</label>
      <input
        id="register-name"
        name="name"
        type="text"
        autocomplete="name"
        [(ngModel)]="registerForm.name"
        required
      />
      <small class="error" *ngIf="registerSubmitted && !registerForm.name.trim()">
        El nombre es obligatorio.
      </small>

      <label for="register-password">Contraseña</label>
      <input
        id="register-password"
        name="password"
        type="password"
        autocomplete="new-password"
        [(ngModel)]="registerForm.password"
        required
      />
      <small class="error" *ngIf="registerSubmitted && registerForm.password.length > 0 && registerForm.password.length < 8">
        La contraseña debe tener al menos 8 caracteres.
      </small>

      <label for="register-confirm-password">Repetir contraseña</label>
      <input
        id="register-confirm-password"
        name="confirmPassword"
        type="password"
        autocomplete="new-password"
        [(ngModel)]="registerForm.confirmPassword"
        required
      />
      <small class="error" *ngIf="passwordsDoNotMatch">
        Las contraseñas no coinciden.
      </small>

      <button type="submit" class="submit-btn" [disabled]="loading">
        {{ loading ? 'Creando cuenta…' : 'Crear cuenta' }}
      </button>
    </form>

    <a routerLink="/" class="back-link">← Volver al inicio</a>
  </div>
</section>
